<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VideosFlow · 三大模块原型预览（升级版）</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#fff; --line:#e6e8eb; --line2:#eef0f3;
    --text:#1f2430; --muted:#8a909c; --muted2:#b4b9c2;
    --accent:#4f6bff; --accent-soft:#eef1ff; --accent-d:#3a52e0;
    --ok:#16a34a; --warn:#f59e0b; --bad:#ef4444; --purple:#8b5cf6;
    --gap:#f59e0b; --mistake:#ef4444; --repeat:#a855f7;
    --radius:10px; --shadow:0 1px 3px rgba(20,30,60,.06),0 6px 18px rgba(20,30,60,.06);
    --video-bg:#161a22;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);font-size:13px;display:flex;flex-direction:column;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .btn{background:var(--accent);color:#fff;padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .btn:hover{background:var(--accent-d)}
  .btn.ghost{background:var(--panel);color:var(--text);border:1px solid var(--line);box-shadow:var(--shadow)}
  .btn.ghost:hover{background:var(--line2)}
  .btn.sm{padding:4px 10px;font-size:12px}
  .btn.ok{background:var(--ok)}
  .btn.ok:hover{background:#128a3f}
  .btn.bad{background:var(--bad)}
  .btn.bad:hover{background:#cc2f2f}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
  .tag.key{background:#ecfdf5;color:#059669}
  .tag.spoken{background:#eff6ff;color:#2563eb}
  .tag.ai{background:#fdf4ff;color:#a21caf}
  .tag.gen{background:#eef2ff;color:#4f46e5}
  .tag.done{background:#ecfdf5;color:#059669}
  .tag.gap{background:#fff7ed;color:var(--gap)}
  .tag.mis{background:#fef2f2;color:var(--mistake)}
  .tag.rep{background:#faf5ff;color:var(--repeat)}

  header{height:54px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;
    padding:0 16px;gap:16px;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px}
  .brand .logo{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#4f6bff,#8b5cf6);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
  .proj{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;border:1px solid var(--line);
    padding:5px 10px;border-radius:8px;background:var(--bg)}
  .modtabs{display:flex;gap:6px;margin-left:8px}
  .modtab{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:9px;font-weight:700;color:var(--muted);
    border:1px solid transparent;transition:.15s}
  .modtab .ic{font-size:15px}
  .modtab:hover{color:var(--text);background:var(--line2)}
  .modtab.active{background:var(--accent);color:#fff;box-shadow:var(--shadow)}

  .body{flex:1;display:flex;min-height:0}
  .left{width:240px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
  .lp-head{padding:12px 14px;font-weight:700;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line2)}
  .left .scroll{flex:1;overflow:auto;padding:10px}

  .center{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  .stage-head{padding:13px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
  .stage-head .top{display:flex;align-items:center;justify-content:space-between}
  .stage-head h2{margin:0;font-size:15px}
  .stage-head .desc{color:var(--muted);font-size:12px;margin-top:3px}
  .substep{display:flex;gap:4px;margin-top:12px;flex-wrap:wrap}
  .ss{padding:5px 11px;border-radius:999px;font-size:11.5px;font-weight:600;color:var(--muted);background:var(--line2);display:flex;gap:6px;align-items:center}
  .ss.active{background:var(--accent-soft);color:var(--accent-d)}
  .ss.done{background:#ecfdf5;color:#059669}
  .stage-body{flex:1;overflow:auto;padding:18px}

  .right{width:296px;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
  .rp-head{padding:12px 14px;font-weight:700;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line2)}
  .rp-body{padding:14px;overflow:auto;flex:1;display:flex;flex-direction:column;gap:12px}

  footer{height:46px;background:var(--panel);border-top:1px solid var(--line);display:flex;align-items:center;
    padding:0 14px;gap:14px;flex-shrink:0}
  .transport{display:flex;align-items:center;gap:8px}
  .tbtn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--line2);color:var(--text)}
  .tbtn.play{background:var(--accent);color:#fff}
  .time{font-variant-numeric:tabular-nums;color:var(--muted);font-size:12px}
  .prog{flex:1;height:6px;background:var(--line2);border-radius:999px;overflow:hidden}
  .prog>i{display:block;height:100%;width:64%;background:var(--accent);transition:width .3s}
  .tasklabel{font-size:11.5px;color:var(--muted)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .grid{display:grid;gap:14px}
  .muted{color:var(--muted)}
  .sec-title{font-weight:700;font-size:13px;margin:0 0 10px}
  .pill{font-size:11px;color:var(--muted);border:1px solid var(--line);padding:3px 9px;border-radius:999px;background:var(--bg)}

  /* film */
  .cat{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:.15s}
  .cat:hover{background:var(--line2)}
  .cat.active{background:var(--accent-soft);color:var(--accent-d);font-weight:700}
  .cat .nm{flex:1}
  .cat .ct{font-size:11px;color:var(--muted);background:var(--line2);border-radius:999px;padding:1px 8px}
  .cat .ed{font-size:11px;color:var(--muted2);opacity:0;transition:.15s}
  .cat:hover .ed{opacity:1}
  .proj-card{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow);cursor:pointer;transition:.15s}
  .proj-card:hover{border-color:var(--accent)}
  .proj-card .cv{aspect-ratio:16/9;background:linear-gradient(135deg,#1f2430,#2d3340);display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:13px;position:relative}
  .proj-card .cb{padding:9px 11px}
  .proj-card .pt{font-weight:600;font-size:12.5px}
  .proj-card .ps{font-size:11px;margin-top:2px}

  /* spoken */
  .drop{border:2px dashed var(--line);border-radius:12px;padding:34px;text-align:center;color:var(--muted);background:var(--panel)}
  .drop .big{font-size:30px;margin-bottom:8px}
  .sv{display:flex;gap:10px;padding:10px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;background:var(--panel);cursor:pointer}
  .sv:hover{border-color:var(--accent);background:var(--accent-soft)}
  .sv .vb{width:54px;height:38px;border-radius:6px;background:var(--video-bg);display:flex;align-items:center;justify-content:center;color:#6b7280;flex-shrink:0}
  .sv .nm{font-weight:600;font-size:12.5px}
  .sv .sub{color:var(--muted);font-size:11px;margin-top:2px}
  .wave{display:flex;align-items:flex-end;gap:2px;height:64px;padding:8px;background:var(--video-bg);border-radius:10px}
  .wave i{flex:1;background:linear-gradient(180deg,#4f6bff,#8b5cf6);border-radius:2px;opacity:.85}
  .asset-list{display:flex;flex-wrap:wrap;gap:8px}
  .asset-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border:1px solid var(--line);border-radius:999px;font-size:12px;background:#fff}
  .asset-chip .at{font-size:11px}
  .asset-chip .ax{color:#ef4444;cursor:pointer;font-size:11px;margin-left:2px}
  .m-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line2);font-size:12.5px}
  .m-row .m-seg{font-variant-numeric:tabular-nums;font-weight:600;color:var(--accent-d);width:36px;flex-shrink:0}
  .m-row .m-text{color:var(--fg);flex:1;min-width:0}
  .m-row .m-kw{color:var(--muted);white-space:nowrap}
  .m-row .m-asset{color:#4f6bff;background:#eef2ff;padding:3px 8px;border-radius:6px;white-space:nowrap}
  .m-row .acts{margin-left:auto;flex-shrink:0}
  .mix-track{display:flex;align-items:center;gap:10px;margin-top:8px}
  .mix-lbl{font-size:11.5px;color:var(--muted);white-space:nowrap;width:46px;flex-shrink:0}
  .mix-track .wave{flex:1;height:46px;padding:6px 8px}
  .mix-track .wave.orig i{background:linear-gradient(180deg,#9ca3af,#6b7280)}
  .mix-track .wave.narr i{background:linear-gradient(180deg,#4f6bff,#8b5cf6)}
  .tr-line{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line2)}
  .tr-line .t{font-variant-numeric:tabular-nums;color:var(--accent-d);font-weight:600;width:40px;flex-shrink:0}
  .tr-line .x{flex:1;line-height:1.5}
  .tr-line .x .hl{background:#fde68a;border-radius:3px;padding:0 2px}
  .tr-line .x .kw{background:#fee2e2;color:var(--bad);border-radius:3px;padding:0 4px;font-weight:700}
  .tr-line .x .flw{background:linear-gradient(180deg,#fbbf24,#f59e0b);color:#fff;border-radius:4px;padding:1px 6px;font-weight:800;letter-spacing:.5px;box-shadow:0 1px 0 rgba(0,0,0,.1)}
  .tr-line .x .flw.emo{background:linear-gradient(180deg,#f472b6,#a855f7)}
  .tr-line .x .flw.kw{background:linear-gradient(180deg,#fafafa,#e5e7eb);color:#1f2430;border:1px solid var(--line);text-shadow:none}

  /* creation */
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .field label{font-size:11.5px;color:var(--muted);font-weight:600}
  .field textarea,.field input,.field select{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;background:var(--bg);color:var(--text);font-family:inherit;resize:vertical}
  .field textarea:focus,.field input:focus,.field select:focus{outline:none;border-color:var(--accent);background:#fff}
  .script-box{border:1px solid var(--line);border-radius:10px;padding:14px;background:var(--panel);line-height:1.8;font-size:13px;white-space:pre-wrap}
  .shot{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px}
  .shot .body{padding:11px 13px}
  .shot .idx{font-weight:800;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .shot .desc{color:var(--muted);font-size:12px;line-height:1.55}
  .shot .meta{display:flex;gap:10px;margin-top:7px;font-size:11px;color:var(--muted)}
  .gen-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .frame-card{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel)}
  .frame-card .fr{height:120px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;position:relative}
  .frame-card .fr .lab{position:absolute;top:6px;left:8px;background:rgba(0,0,0,.4);padding:1px 8px;border-radius:999px;font-size:10px}
  .frame-card .fr.empty{background:repeating-linear-gradient(45deg,#1f2430,#1f2430 10px,#262b36 10px,#262b36 20px);color:#9aa3b2}
  .frame-card .fb{padding:9px 11px;display:flex;justify-content:space-between;align-items:center}
  .style-ref{border:1px dashed var(--accent);border-radius:9px;padding:11px;background:var(--accent-soft);display:flex;gap:11px;align-items:center;margin-bottom:14px}
  .style-ref .ri{width:52px;height:52px;border-radius:8px;background:linear-gradient(135deg,#f472b6,#a855f7);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px}
  .style-chips{display:flex;gap:7px;flex-wrap:wrap}
  .schip{font-size:12.5px;padding:5px 13px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--ink);cursor:pointer;font-family:inherit;transition:.15s}
  .schip:hover{border-color:var(--accent)}
  .schip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  .sub-row{display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line2);align-items:center}
  .sub-row .st{font-variant-numeric:tabular-nums;color:var(--accent-d);font-weight:600;width:70px;flex-shrink:0}
  .preview-box{background:var(--video-bg);border-radius:10px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:13px;position:relative;overflow:hidden}
  .preview-box .pbar{position:absolute;bottom:0;left:0;height:3px;background:var(--accent);width:0%}
  .kpis{display:flex;gap:10px;margin-bottom:14px}
  .kpi{flex:1;border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:var(--panel)}
  .kpi .v{font-size:18px;font-weight:800}
  .kpi .l{font-size:11px;color:var(--muted);margin-top:2px}
  .ol{display:flex;flex-direction:column;gap:2px}
  .ol .it{display:flex;gap:9px;padding:8px 9px;border-radius:8px;font-size:12px;color:var(--muted)}
  .ol .it .n{width:18px;height:18px;border-radius:50%;background:var(--line2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
  .ol .it.active{background:var(--accent-soft);color:var(--accent-d);font-weight:700}
  .ol .it.done{color:var(--ok)}
  .ol .it.done .n{background:var(--ok);color:#fff}
  .empty-hint{padding:40px;text-align:center;color:var(--muted);font-size:13px}
  /* 创作模块新增 */
  .mini{font-size:12px;padding:3px 7px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);font-family:inherit}
  .shot .idx{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
  .ed-row{display:flex;gap:8px;align-items:flex-start;margin-top:6px}
  .ed-row label{font-size:11px;color:var(--muted);width:30px;flex-shrink:0;line-height:26px}
  .ed{flex:1;font-size:12.5px;line-height:1.5;border:1px solid var(--line);border-radius:7px;padding:5px 8px;resize:vertical;font-family:inherit;color:var(--ink);background:#fff}
  .ref-thumbs{display:flex;flex-direction:column;gap:8px;padding:0 11px 10px}
  .ref-group{display:flex;flex-direction:column;gap:5px}
  .ref-g-label{font-size:11px;font-weight:700;color:var(--accent-d)}
  .ref-row{display:flex;gap:6px;flex-wrap:wrap}
  .ref-thumb{position:relative;width:54px;height:54px;border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .ref-thumb img{width:100%;height:100%;object-fit:cover}
  .ref-thumb .rcat{position:absolute;bottom:0;left:0;right:0;width:100%;border:none;font-size:9px;background:rgba(0,0,0,.6);color:#fff;padding:1px 2px}
  .ref-thumb .x{position:absolute;top:1px;right:1px;width:16px;height:16px;border:none;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:11px;line-height:1;cursor:pointer}
  .voice-list{display:flex;flex-direction:column;gap:7px;margin:6px 0}
  .voice-item{display:flex;align-items:center;gap:12px;padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel)}
  .voice-item.on{border-color:var(--accent);background:var(--accent-soft)}
  .voice-item .vc{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}
  .voice-item .ip-in{font-size:11px;color:var(--muted)}

  /* ===== 影片剪辑台 ===== */
  .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .video-stub{aspect-ratio:16/9;background:linear-gradient(135deg,#1f2430,#2d3340);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#9aa3b2;font-size:13px}
  .align-progress{height:8px;background:var(--line2);border-radius:999px;overflow:hidden;margin:10px 0}
  .align-progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width .4s}
  .seg-card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--panel);display:flex;gap:10px;align-items:center;margin-bottom:8px}
  .seg-card .ti{font-variant-numeric:tabular-nums;color:var(--accent-d);font-weight:700;width:90px;flex-shrink:0;font-size:12px}
  .seg-card .tx{flex:1;font-size:12.5px;line-height:1.5}
  .seg-card .dr{font-variant-numeric:tabular-nums;color:var(--muted);font-size:11px;width:60px;text-align:right;flex-shrink:0}
  .seg-card .kept{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ok)}
  .seg-card.dropped{opacity:.5;text-decoration:line-through;color:var(--muted)}
  .track-row{display:grid;grid-template-columns:74px 1fr;gap:10px;align-items:center;margin-bottom:8px}
  .track-row .lab{font-size:12px;color:var(--muted);font-weight:600}
  .track{display:flex;gap:3px;background:var(--line2);border-radius:7px;padding:5px;min-height:42px;overflow-x:auto;position:relative}
  .track.gen .block{background:linear-gradient(135deg,#a855f7,#6366f1)}
  .track.video .block{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
  .track.audio .block{background:linear-gradient(135deg,#10b981,#059669)}
  .track.sub .block{background:linear-gradient(135deg,#f59e0b,#d97706)}
  .block{padding:6px 8px;border-radius:5px;color:#fff;font-size:11px;cursor:pointer;transition:.15s;flex-shrink:0;display:flex;align-items:center;font-weight:600;white-space:nowrap;overflow:hidden}
  .block:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.15)}
  .block.selected{outline:2px solid var(--accent);outline-offset:1px}
  .flow-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .flow-card{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:10px;cursor:pointer;transition:.15s}
  .flow-card:hover{border-color:var(--accent)}
  .flow-card.active{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 2px var(--accent-soft)}
  .flow-card .pt{font-weight:700;font-size:12.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .flow-card .pp{border-radius:6px;padding:6px 8px;font-size:12px;line-height:1.4}
  .flow-card .ds{font-size:11px;color:var(--muted);margin-top:6px}
  .flow-card .pp.emphasis{background:linear-gradient(180deg,#fbbf24,#f59e0b);color:#fff;font-weight:700;text-shadow:0 1px 0 rgba(0,0,0,.2)}
  .flow-card .pp.emotion{background:linear-gradient(180deg,#f472b6,#a855f7);color:#fff;font-weight:700}
  .flow-card .pp.shout{background:#ef4444;color:#fff;font-weight:900;letter-spacing:1px;text-shadow:0 1px 0 rgba(0,0,0,.3)}
  .flow-card .pp.keyword{background:#fff;border:1px solid var(--text);color:var(--text);font-weight:700;display:inline-block}
  .flow-card .pp.underline{background:#fff;color:var(--accent-d);font-weight:700;border-bottom:3px solid var(--accent)}
  .flow-card .pp.shake{background:#fff;color:var(--bad);font-weight:700;font-style:italic;border:1px dashed var(--bad)}

  /* ===== 口播纠正 ===== */
  .iss-stat{display:flex;gap:10px;margin-bottom:14px}
  .iss-stat .stat{flex:1;border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:var(--panel);border-left:3px solid var(--line)}
  .iss-stat .stat.gap{border-left-color:var(--gap)}
  .iss-stat .stat.mis{border-left-color:var(--mistake)}
  .iss-stat .stat.rep{border-left-color:var(--repeat)}
  .iss-stat .stat.acc{border-left-color:var(--ok)}
  .iss-row{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:var(--panel);margin-bottom:8px;display:grid;grid-template-columns:74px 70px 1fr auto;gap:10px;align-items:center}
  .iss-row .ti{font-variant-numeric:tabular-nums;color:var(--accent-d);font-weight:700;font-size:12px}
  .iss-row .tx{font-size:12.5px;line-height:1.5}
  .iss-row .tx del{color:var(--bad);opacity:.7}
  .iss-row .tx ins{color:var(--ok);text-decoration:none;background:#dcfce7;border-radius:3px;padding:0 4px;font-weight:600}
  .iss-row .acts{display:flex;gap:6px}

function buildVoiceLines(text){
  // 解说文案按段切分，每段生成配音时间戳
  const paras=(text||'').split(/\n+/).map(s=>s.trim()).filter(Boolean);
  if(!paras.length) return [];
  const starts=[0,4.2,8.4,12.6,16.8,21.0,25.2];
  return paras.map((p,i)=>({t:String(Math.floor(starts[i]/60))+':'+(starts[i]%60<10?'0':'')+(starts[i]%60).toFixed(1).replace(/\.0$/,'.0'),x:p,dur:Math.round(starts[i+1]-starts[i]||3.2)}));
}

window.goSpokenStage=function(id){spokenStage=id;renderStage();};
window.uploadSpoken=function(){const n='口播视频'+spokenVideos.length+'.mp4';spokenVideos.unshift({id:'v'+Date.now(),name:n,dur:'0'+(1+Math.floor(Math.random()*3))+':'+String(Math.floor(Math.random()*60)).padStart(2,'0'),tr:[],script:null,keywords:[],assets:[],matchResults:null,issues:[]});spokenSel=spokenVideos[0].id;renderAll();};
window.transcribe=function(id){const v=spokenVideos.find(x=>x.id===id);setTask('识别音频中…',50);setTimeout(()=>{v.script=v.tr.map(r=>r.x.replace(/那个|呃/g,'')).join('');setTask('文案提取完成',100);setTimeout(()=>setTask('空闲',0),1200);renderAll();},1300);};
window.copyToCreation=function(){cState.reqFromSpoken='（来自口播文案）';module='creation';cStage='req';renderAll();};
window.assetTypeLabel=function(t){return {image:'🖼 图片',bgm:'🎵 BGM',sfx:'🔊 音效',clip:'🎬 片段'}[t]||'文件';};
window.uploadAsset=function(id){const v=spokenVideos.find(x=>x.id===id);const name=prompt('素材名称（留空随机）：');if(name===null)return;const types=['image','bgm','sfx','clip'];const t=types[(v.assets?v.assets.length:0)%4];if(!v.assets)v.assets=[];v.assets.push({name:name||('素材'+(v.assets.length+1)+'.'+t),type:t});renderAll();};
window.delAsset=function(id,name){const v=spokenVideos.find(x=>x.id===id);v.assets=v.assets.filter(a=>a.name!==name);renderAll();};
window.doMatch=function(id){const v=spokenVideos.find(x=>x.id===id);setTask('智能匹配素材中…',40);setTimeout(()=>{
  const segs=v.tr.filter(r=>r.x.length>6);
  v.matchResults=segs.slice(0,4).map((r,i)=>{
    const a=(v.assets&&v.assets[i])||null;
    const kw=(v.keywords&&v.keywords[i])||null;
    return {seg:r.t,text:r.x.slice(0,12),asset:a?a.name:'(暂无匹配素材)',kw:kw||'',applied:!!a};
  });
  setTask('匹配完成',100);setTimeout(()=>setTask('空闲',0),1200);renderAll();
},1200);};
window.toggleMatch=function(id,seg){const v=spokenVideos.find(x=>x.id===id);const m=v.matchResults&&v.matchResults.find(x=>x.seg===seg);if(m)m.applied=!m.applied;renderStage();};
window.applyAllMatch=function(id){const v=spokenVideos.find(x=>x.id===id);if(v.matchResults)v.matchResults.forEach(m=>m.applied=true);renderStage();};
window.setIssue=function(vid,iid,val){const v=spokenVideos.find(x=>x.id===vid);const it=v.issues.find(x=>x.id===iid);it.accepted=val;renderStage();};
window.acceptAllIssues=function(){const v=spokenVideos.find(x=>x.id===spokenSel);v.issues.forEach(i=>i.accepted=true);renderStage();};
window.ignoreAllIssues=function(){const v=spokenVideos.find(x=>x.id===spokenSel);v.issues.forEach(i=>i.accepted=false);renderStage();};
window.cleanFromAccepted=function(){const v=spokenVideos.find(x=>x.id===spokenSel);const acc=new Set(v.issues.filter(i=>i.accepted).map(i=>i.id));v.cleanScript=`大家好，今天给大家介绍我们的新产品 VideosFlow。\n它是一款基于 AI 的智能视频剪辑工具。\n可以自动根据文案剪辑视频。\n还能修掉口播里的气口和口误，提升观感。\n大家记得点赞关注哦。`;setTask('干净文案已生成',100);setTimeout(()=>setTask('空闲',0),1000);renderStage();};
window.pickSpokenFlower=function(id){editorState.flower=id;renderStage();};
window.burnFlower=function(){setTask('烧录花字到视频中…',40);setTimeout(()=>{setTask('已烧录 ✓',100);setTimeout(()=>setTask('空闲',0),1200);},1300);};
window.exportSpoken=function(){setTask('导出干净口播片段…',50);setTimeout(()=>{setTask('导出完成 ✓',100);setTimeout(()=>setTask('空闲',0),1200);},1100);};
window.exportSpokenJianYing=function(){
  const v=spokenVideos.find(x=>x.id===spokenSel);
  if(!v){setTask('请先选择一个口播视频',0);return;}
  setTask('生成剪映工程文件…',40);
  setTimeout(()=>{
    const fps=30;
    const tpl=flowerTpls.find(t=>t.id===editorState.flower)||flowerTpls[0];
    const toSec=s=>{const p=String(s).split(':');return p.length===2?(+p[0]*60)+(+p[1]):(+p[0]);};
    const total=v.dur?toSec(v.dur):v.tr.reduce((m,r)=>Math.max(m,toSec(r.t)),0);
    const colorMap={emphasis:'#f59e0b',emotion:'#a855f7',shout:'#ef4444',keyword:'#e5e7eb',underline:'#3b82f6',shake:'#ef4444'};
    const texts=v.tr.map((r,i)=>{
      const start=toSec(r.t);
      const end=v.tr[i+1]?toSec(v.tr[i+1].t):total;
      const kw=(v.keywords||[]).find(k=>r.x.includes(k));
      return {id:'text_'+i,content:r.x,start:+start.toFixed(3),end:+end.toFixed(3),
        flower:!!kw,template:tpl.name,color:kw?colorMap[tpl.cls]:'#ffffff'};
    });
    const draft={
      app_version:'5.x',fps:fps,canvas:{w:1920,h:1080},duration:+total.toFixed(3),
      materials:{
        videos:[{id:'vid_0',file_name:v.name,type:'video',duration:+total.toFixed(3)}],
        texts:texts
      },
      tracks:[
        {type:'video',segments:[{material_id:'vid_0',source:'local',start:0,end:+total.toFixed(3)}]},
        {type:'text',segments:texts.map((t,i)=>({material_id:'text_'+i,start:t.start,end:t.end}))}
      ]
    };
    const blob=new Blob([JSON.stringify(draft,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='draft_content.json';a.click();
    setTask('剪映工程已导出（draft_content.json）✓',100);
    setTimeout(()=>setTask('空闲',0),1600);
  },1300);
};

/* 创作模块：去AI味模板、分镜编辑、参考图、多声音IP、剪映导出 */
window.pickHumanPrompt=function(v){cState.humanPrompt=v;renderStage();};
window.pickStyleRef=function(v){cState.styleRef=v;renderStage();};
window.editStory=function(i,f,v){if(cState.story[i]){cState.story[i][f]=v;}};
window.addRef=function(i){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=()=>{
    const files=Array.from(inp.files||[]);
    if(!cState.refs[i])cState.refs[i]=[];
    const cat=cState.refCat[i]||'IP形象';
    if(files.length===0){renderStage();return;}
    let pending=files.length;
    files.forEach(f=>{const rd=new FileReader();rd.onload=()=>{cState.refs[i].push({name:f.name,dataUrl:rd.result,cat:cat});if(--pending===0)renderStage();};rd.readAsDataURL(f);});
  };
  inp.click();
};
window.setRefCat=function(i,v){cState.refCat[i]=v;};
window.setRefCatItem=function(i,ri,v){if(cState.refs[i]&&cState.refs[i][ri]){cState.refs[i][ri].cat=v;renderStage();}};
window.delRef=function(i,ri){if(cState.refs[i]){cState.refs[i].splice(ri,1);renderStage();}};
window.toggleVoice=function(n){const ex=cState.voices.find(x=>x.name===n);if(ex)cState.voices=cState.voices.filter(x=>x.name!==n);else cState.voices.push({name:n,ip:n});renderStage();};
window.setVoiceIP=function(n,v){const o=cState.voices.find(x=>x.name===n);if(o)o.ip=v;};
window.exportCreationJianYing=function(){
  setTask('生成剪映工程文件…',40);
  setTimeout(()=>{
    const fps=30;
    const shots=cState.story.length?cState.story:[];
    const total=shots.reduce((m,s)=>m+(+s.dur||0),0)||30;
    const texts=(cState.subs.length?cState.subs:defaultSubs()).map((s,i)=>({id:'text_'+i,content:s.x,start:s.t,flower:false}));
    const voices=cState.voices.length?cState.voices:[{name:'默认',ip:'旁白'}];
    const draft={
      app_version:'5.x',fps:fps,canvas:{w:1920,h:1080},duration:+total.toFixed(3),
      materials:{
        videos:shots.map((s,i)=>({id:'shot_'+i,file_name:'镜头'+(i+1)+'.mp4',type:'video',duration:+(+s.dur||0)})),
        texts:texts,
        audios:voices.map((v,i)=>({id:'audio_'+i,voice:v.name,ip:v.ip}))
      },
      tracks:[
        {type:'video',segments:shots.map((s,i)=>({material_id:'shot_'+i,start:0,end:+(+s.dur||0)}))},
        {type:'text',segments:texts.map((t,i)=>({material_id:'text_'+i,start:0,end:+total}))},
        ...voices.map((v,i)=>({type:'audio',voice:v.name,ip:v.ip,segments:[{material_id:'audio_'+i,start:0,end:+total}]}))
      ]
    };
    const blob=new Blob([JSON.stringify(draft,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='draft_content.json';a.click();
    setTask('剪映工程已导出（draft_content.json）✓',100);
    setTimeout(()=>setTask('空闲',0),1600);
  },1300);
};

      <div class="card" style="padding:14px">
        <div class="sec-title">默认导出</div>
        <div class="field"><label>分辨率</label><select onchange="updOther('exportResolution',this.value)">
          ${['3840×2160','1920×1080','1280×720','1080×1920 (竖屏)'].map(x=>`<option ${x===o.exportResolution?'selected':''}>${x}</option>`).join('')}
        </select></div>
        <div class="field"><label>封装格式</label><select onchange="updOther('exportFormat',this.value)">
          ${['MP4 (H.264)','MP4 (H.265/HEVC)','MOV (ProRes)','WebM (VP9)'].map(x=>`<option ${x===o.exportFormat?'selected':''}>${x}</option>`).join('')}
        </select></div>
      </div>
      <div class="card" style="padding:14px">
        <div class="sec-title">自动保存 / 临时文件</div>
        <label style="display:flex;gap:6px;align-items:center;font-size:12.5px"><input type="checkbox" ${o.autoSave?'checked':''} onchange="updOther('autoSave',this.checked)">自动保存工程</label>
        <div class="field"><label>自动保存间隔（秒）</label><input type="number" min="10" max="600" value="${o.autoSaveSec}" onchange="updOther('autoSaveSec',parseInt(this.value))"></div>
        <div class="field"><label>临时文件保留天数</label><input type="number" min="1" max="365" value="${o.cleanupDays}" onchange="updOther('cleanupDays',parseInt(this.value))"></div>
      </div>
      <div class="card" style="padding:14px">
        <div class="sec-title">路径</div>
        <div class="field"><label>FFmpeg 路径</label><input value="${o.ffmpegPath}" onchange="updOther('ffmpegPath',this.value)"></div>
        <div class="field"><label>临时目录</label><input value="${o.tempDir}" onchange="updOther('tempDir',this.value)"></div>
      </div>
    </div>`;
  }
}
function providerOptions(cur,kind){
  const map={
    llm:['OpenAI 兼容','DeepSeek','通义千问','豆包','混元','Ollama (本地)','其他'],
    img:['通义万相','SDXL + IP-Adapter (本地)','OpenAI DALL·E','Stable Diffusion','其他'],
    asr:['本地 faster-whisper','OpenAI Whisper','阿里云 ASR','腾讯云 ASR','其他'],
    tts:['Edge-TTS','CosyVoice (本地)','OpenAI TTS','火山引擎 TTS','其他'],
    video:['通义万相','Runway','Stable Video Diffusion (本地)','Pika','其他'],
  };
  const opts=map[kind]||['其他'];
  return opts.includes(cur)?opts:[cur,...opts];
}
window.goSettingsSub=function(id){settingsSub=id;renderStage();};
window.toggleProvider=function(k,on){settingsState.providers[k].enabled=on;renderStage();};
window.updProvider=function(k,key,val){settingsState.providers[k][key]=val;};
window.testProvider=function(k){const p=settingsState.providers[k];setTask('测试连接 '+p.name+'…',30);setTimeout(()=>{p.test='ok';setTask(p.name+' ✓ 已连接',100);setTimeout(()=>setTask('空闲',0),1000);renderStage();},900);};
window.pickPrompt=function(k){settingsState.promptEditing=k;renderStage();};
window.updPrompt=function(key,val){settingsState.prompts[settingsState.promptEditing][key]=val;};
window.savePrompt=function(){setTask('提示词已保存',100);setTimeout(()=>setTask('空闲',0),800);};
window.resetPrompt=function(){const defaults={script:'请你担任资深短视频文案，根据以下需求撰写一份适合配音的画面感文案，长度约 60-80 字，语气自然：\n\n需求：{{brief}}\n风格：{{style}}\n受众：{{audience}}',humanize:'请你把以下文案改写成自然口语，去掉 AI 套话与空泛表达，加具体细节、停顿感与生活化比喻，保持原意：\n\n{{script}}',storyboard:'请将以下文案拆为 4-6 个镜头，每个镜头给出：画面描述、台词、时长秒、运镜建议，JSON 数组返回：\n\n{{script}}',narration:'请你为以下视频撰写一段解说稿，画面感强、有节奏、可二次编辑，分段输出：\n\n视频：{{title}}\n风格：{{style}}',detect:'请找出以下口播转写中的【口误/卡顿/重复/不流畅】，按 JSON 数组返回，含 issue_type / start / end / suggestion / text：\n\n{{transcript}}',keywords:'请从以下文案中抽取 5-8 个值得在字幕中高亮/花字强调的关键词或短句，JSON 数组：\n\n{{script}}'};const k=settingsState.promptEditing;if(defaults[k]){settingsState.prompts[k].body=defaults[k];renderStage();}};
window.addPrompt=function(){const k='custom_'+Date.now();const name=prompt('新模板名称：','我的提示词');if(!name)return;settingsState.prompts[k]={name,body:'请输入提示词…\n\n{{input}}',placeholder:'{{input}}'};settingsState.promptEditing=k;renderStage();};
window.delPrompt=function(){delete settingsState.prompts[settingsState.promptEditing];settingsState.promptEditing=Object.keys(settingsState.prompts)[0];renderStage();};
window.updOther=function(key,val){settingsState.other[key]=val;};
window.saveSettings=function(){setTask('已保存全部配置',100);setTimeout(()=>setTask('空闲',0),800);};
window.resetSettings=function(){setTask('已恢复默认',100);setTimeout(()=>setTask('空闲',0),800);renderStage();};

function renderInspector(){
  const map={film:'影片属性',spoken:'口播属性',creation:'创作进度',settings:'配置概览'};
  $('#rpTitle').textContent=map[module];
  if(module==='film'){
    if(filmStage==='editor'){
      const stepIdx=editorSteps.findIndex(s=>s.id===editorSub);
      b.innerHTML=`<div class="kpi" style="margin:0"><div class="v">${editingProj?editingProj.t:'—'}</div><div class="l">当前工程</div></div>
        <div class="ol">${editorSteps.map((s,i)=>`<div class="it ${s.id===editorSub?'active':(i<stepIdx?'done':'')}"><span class="n">${i+1}</span>${s.name.replace(/^[①②③④⑤]/,'')} ${i<stepIdx?'✓':''}</div>`).join('')}</div>
        <div class="muted" style="font-size:12px;line-height:1.6">剪辑台六步：生成解说文案 → 导入对齐 → 解说配音 → 自动切点 → 时间线精修 → 字幕花字导出。</div>`;
    } else {
      const c=filmCats.find(x=>x.id===filmCat);
      b.innerHTML=`<div class="kpi" style="margin:0"><div class="v">${c.n}</div><div class="l">${c.name}工程数</div></div>
        <div class="muted" style="font-size:12px;line-height:1.6">类型可扩展/改名；点击工程卡 → 进入剪辑台。</div>`;
    }
  } else if(module==='spoken'){
    const v=spokenVideos.find(x=>x.id===spokenSel);
    if(spokenStage==='fix' && v){
      const c={gap:0,mistake:0,repeat:0,acc:0};
      v.issues.forEach(i=>{c[i.type]++;if(i.accepted)c.acc++;});
      b.innerHTML=`<div class="kpi" style="margin:0"><div class="v">${c.acc}/${v.issues.length}</div><div class="l">已采纳 / 总数</div></div>
        <div class="muted" style="font-size:12px;line-height:1.6">气口 ${c.gap} · 口误 ${c.mistake} · 重复 ${c.repeat}。<br>建议默认"采纳/忽略"双选，不破坏原片。</div>`;
    } else if(spokenStage==='flw' && v){
      b.innerHTML=`<div class="kpi" style="margin:0"><div class="v">${(v.keywords||[]).length}</div><div class="l">关键词</div></div>
        <div class="muted" style="font-size:12px;line-height:1.6">当前模板：<b>${flowerTpls.find(t=>t.id===editorState.flower).name}</b><br>点切换 → 字幕实时变化 → 烧录到视频。</div>`;
    } else {
      b.innerHTML=v?`<div class="kpi" style="margin:0"><div class="v">${v.script?'✓':'—'}</div><div class="l">文案提取</div></div>
        <div class="muted" style="font-size:12px;line-height:1.6">保留纠正与花字：识别后可纠正气口/口误/重复，并烧录花字字幕。</div>`:
        `<div class="muted" style="font-size:12px;line-height:1.6">上传视频并识别音频以提取文案。</div>`;
    }
  } else if(module==='settings'){
    const enabled=Object.values(settingsState.providers).filter(p=>p.enabled).length;
    const tc=Object.keys(settingsState.providers).length;
    const pc=Object.keys(settingsState.prompts).length;
    b.innerHTML=`<div class="kpi" style="margin:0"><div class="v">${enabled}/${tc}</div><div class="l">已启用模型</div></div>
      <div class="kpi" style="margin:0;margin-top:8px"><div class="v">${pc}</div><div class="l">提示词模板</div></div>
      <div class="muted" style="font-size:12px;line-height:1.6;margin-top:8px">所有密钥保存到本地系统凭据，<br>不进 SQLite 明文。<br>配置变更即时生效。</div>`;
  } else {
    const done=cSteps.findIndex(s=>s.id===cStage);
    b.innerHTML=`<div class="ol">${cSteps.map((s,i)=>`<div class="it ${s.id===cStage?'active':(i<done?'done':'')}"><span class="n">${i+1}</span>${s.name}${i<done?' ✓':''}</div>`).join('')}</div>
      <div class="muted" style="font-size:12px;line-height:1.6">七步向导：需求→文案→去AI味→分镜→图片→首尾帧视频→配音字幕→导出。</div>`;
  }
}

/* ---------------- 总渲染 ---------------- */
function renderAll(){renderModTabs();renderLeft();renderStage();$('#exportBtn').onclick=()=>{module='creation';cStage='export';renderAll();};}
renderAll();
</script>
